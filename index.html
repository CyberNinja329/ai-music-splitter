<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Audio Splitter Ultra Pro v3.0</title>
    <style>
        /* -------------------------------------------------------------------------- */
        /* 1. CSS VARIABLES & THEME SETUP                                             */
        /* -------------------------------------------------------------------------- */
        :root {
            --bg-base: #060913;
            --bg-canvas: linear-gradient(135deg, #05070f 0%, #0e1726 100%);
            --panel-overlay: rgba(15, 23, 42, 0.65);
            --panel-border: rgba(255, 255, 255, 0.07);
            
            --glow-cyan: #00f2fe;
            --glow-blue: #4facfe;
            --text-primary: #f8fafc;
            --text-secondary: #cbd5e1;
            --text-muted: #64748b;
            
            --font-stack: 'Segoe UI', system-ui, -apple-system, sans-serif;
            --transition-smooth: all 0.4s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        /* -------------------------------------------------------------------------- */
        /* 2. GLOBAL RESET & BASE STYLES                                              */
        /* -------------------------------------------------------------------------- */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: var(--font-stack);
            background: var(--bg-canvas);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            overflow-x: hidden;
        }

        /* -------------------------------------------------------------------------- */
        /* 3. CORE CONTAINER LAYOUT                                                   */
        /* -------------------------------------------------------------------------- */
        .app-mainframe {
            background: var(--panel-overlay);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            width: 100%;
            max-width: 750px;
            border-radius: 32px;
            border: 1px solid var(--panel-border);
            box-shadow: 0 30px 70px rgba(0, 0, 0, 0.7),
                        0 0 60px rgba(0, 242, 254, 0.02);
            padding: 40px;
            position: relative;
            transition: var(--transition-smooth);
        }

        .app-header {
            margin-bottom: 35px;
            text-align: center;
        }

        .app-title {
            font-size: 34px;
            font-weight: 900;
            letter-spacing: -0.75px;
            background: linear-gradient(to right, var(--glow-cyan), var(--glow-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        .app-desc {
            color: var(--text-secondary);
            font-size: 14px;
            font-weight: 400;
            letter-spacing: 0.25px;
        }

        /* -------------------------------------------------------------------------- */
        /* 4. MULTI-PAGE CONTROLLER SYSTEM                                            */
        /* -------------------------------------------------------------------------- */
        .app-page {
            display: none;
            opacity: 0;
            transform: translateY(15px);
            transition: var(--transition-smooth);
        }

        .app-page.active-page {
            display: block;
            opacity: 1;
            transform: translateY(0);
        }

        /* -------------------------------------------------------------------------- */
        /* 5. PAGE 1: DYNAMIC PREMIUM UPLOAD TRIGGER BUTTON                          */
        /* -------------------------------------------------------------------------- */
        .upload-section-box {
            padding: 40px 10px;
            text-align: center;
        }

        .premium-trigger-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, var(--glow-cyan), var(--glow-blue));
            color: #040712;
            padding: 20px 45px;
            border-radius: 50px;
            font-size: 18px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 8px 25px rgba(0, 242, 254, 0.3);
            letter-spacing: 0.5px;
            border: none;
            outline: none;
        }

        .premium-trigger-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 30px rgba(0, 242, 254, 0.5);
        }

        .premium-trigger-btn span {
            margin-right: 12px;
            font-size: 24px;
        }

        .formats-info-label {
            margin-top: 25px;
            font-size: 13px;
            color: var(--text-muted);
            display: block;
            letter-spacing: 0.5px;
        }

        /* -------------------------------------------------------------------------- */
        /* 6. PAGE 2: HIGH-SPEED IFRAME ENGINE TERMINAL                               */
        /* -------------------------------------------------------------------------- */
        .iframe-container-panel {
            width: 100%;
            height: 520px;
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(0, 0, 0, 0.2);
            box-shadow: inset 0 2px 8px rgba(0,0,0,0.5);
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .utility-footer {
            margin-top: 25px;
            text-align: center;
        }

        .action-reboot-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.15);
            color: var(--text-secondary);
            padding: 10px 24px;
            border-radius: 30px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition-smooth);
            letter-spacing: 0.5px;
        }

        .action-reboot-btn:hover {
            color: #fff;
            border-color: rgba(255, 255, 255, 0.4);
            background: rgba(255, 255, 255, 0.03);
        }
    </style>
</head>
<body>

    <div class="app-mainframe">
        
        <div class="app-header">
            <h1 class="app-title">AI Music Splitter</h1>
            <p class="app-desc">Extract high-fidelity vocals and instrumentals tracks securely</p>
        </div>

        <div id="view-page-upload" class="app-page active-page">
            <div class="upload-section-box">
                <button class="premium-trigger-btn" id="initiate-splitter-trigger">
                    <span>📤</span> Upload Audio Document
                </button>
                <span class="formats-info-label">Supported Extensions: MP3, WAV, FLAC, M4A (Max 20MB)</span>
            </div>
        </div>

        <div id="view-page-results" class="app-page">
            <div class="iframe-container-panel">
                <iframe src="https://asish-98-music-splitter.hf.space/?__theme=dark" allow="autoplay"></iframe>
            </div>

            <div class="utility-footer">
                <button class="action-reboot-btn" id="trigger-app-reset">Process Another Track</button>
            </div>
        </div>

    </div>

    <script>
        const DOM_REGISTRY = {
            uploadTrigger: document.getElementById('initiate-splitter-trigger'),
            pageUpload: document.getElementById('view-page-upload'),
            pageResults: document.getElementById('view-page-results'),
            appResetBtn: document.getElementById('trigger-app-reset')
        };

        // Navigation core state coordinator
        function executeScreenNavigation(targetScreenId) {
            DOM_REGISTRY.pageUpload.classList.remove('active-page');
            DOM_REGISTRY.pageResults.classList.remove('active-page');

            if (targetScreenId === 'UPLOAD') DOM_REGISTRY.pageUpload.classList.add('active-page');
            if (targetScreenId === 'RESULTS') DOM_REGISTRY.pageResults.classList.add('active-page');
        }

        // Trigger dynamic transition on user interaction
        DOM_REGISTRY.uploadTrigger.addEventListener('click', function() {
            executeScreenNavigation('RESULTS');
        });

        // Application reboot runtime handler
        DOM_REGISTRY.appResetBtn.addEventListener('click', function() {
            window.location.reload();
        });
    </script>
</body>
</html>
