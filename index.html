<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Audio Vocal Remover Pro</title>
    <style>
        :root {
            --bg-canvas: linear-gradient(135deg, #0f172a 0%, #1e1b4b 100%);
            --panel-bg: rgba(30, 41, 59, 0.7);
            --accent-cyan: #06b6d4;
            --accent-pink: #ec4899;
            --text-main: #f8fafc;
        }

        body {
            font-family: 'Segoe UI', system-ui, sans-serif;
            background: var(--bg-canvas);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            margin: 0;
        }

        .container {
            background: var(--panel-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 24px;
            width: 100%;
            max-width: 550px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            text-align: center;
        }

        h1 {
            font-size: 28px;
            background: linear-gradient(to right, var(--accent-cyan), var(--accent-pink));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }

        p {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 30px;
        }

        .upload-btn {
            background: linear-gradient(135deg, var(--accent-cyan), #3b82f6);
            color: white;
            padding: 14px 30px;
            border-radius: 50px;
            border: none;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 15px rgba(6, 182, 212, 0.3);
        }

        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(6, 182, 212, 0.5);
        }

        input[type="file"] {
            display: none;
        }

        .status {
            margin-top: 20px;
            font-size: 14px;
            color: #e2e8f0;
            display: none;
        }

        .player-section {
            margin-top: 30px;
            display: none;
            flex-direction: column;
            gap: 20px;
            text-align: left;
        }

        .track-card {
            background: rgba(255,255,255,0.05);
            padding: 15px;
            border-radius: 12px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .track-title {
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--accent-cyan);
            margin-bottom: 8px;
            font-weight: bold;
        }

        audio {
            width: 100%;
            filter: invert(0.9) hue-rotate(180deg);
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Vocal Remover Lite</h1>
        <p>Instant browser-level processing without cloud servers or timeouts</p>

        <label class="upload-btn">
            📁 Select Audio File
            <input type="file" id="audio-file" accept="audio/*">
        </label>

        <div class="status" id="status-msg">Processing audio matrix locally... ⚡</div>

        <div class="player-section" id="player-panel">
            <div class="track-card">
                <div class="track-title" style="color: #3b82f6;">🎵 Original Track</div>
                <audio id="audio-original" controls></audio>
            </div>
            
            <div class="track-card">
                <div class="track-title" style="color: var(--accent-pink);">🥁 Instrumental / Karaoke (Vocals Removed)</div>
                <audio id="audio-processed" controls></audio>
            </div>
        </div>
    </div>

    <script>
        const fileInput = document.getElementById('audio-file');
        const statusMsg = document.getElementById('status-msg');
        const playerPanel = document.getElementById('player-panel');
        const audioOriginal = document.getElementById('audio-original');
        const audioProcessed = document.getElementById('audio-processed');

        fileInput.addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (!file) return;

            // Show original track immediately
            audioOriginal.src = URL.createObjectURL(file);
            
            statusMsg.style.display = 'block';
            playerPanel.style.display = 'none';

            try {
                // Initialize Web Audio API Context
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const audioCtx = new AudioContext();
                
                // Read file as ArrayBuffer
                const arrayBuffer = await file.arrayBuffer();
                const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);

                const numChannels = audioBuffer.numberOfChannels;
                const sampleRate = audioBuffer.sampleRate;
                const length = audioBuffer.length;

                // Create an empty output buffer for processed audio
                const outputBuffer = audioCtx.createBuffer(numChannels, length, sampleRate);

                if (numChannels >= 2) {
                    // Center Channel Subtraction Algorithm (Phase Inversion)
                    const leftChannel = audioBuffer.getChannelData(0);
                    const rightChannel = audioBuffer.getChannelData(1);
                    
                    const outLeft = outputBuffer.getChannelData(0);
                    const outRight = outputBuffer.getChannelData(1);

                    for (let i = 0; i < length; i++) {
                        // Subtracting channels removes centered mono signals (typically vocals)
                        const instrumentalNode = leftChannel[i] - rightChannel[i];
                        outLeft[i] = instrumentalNode;
                        outRight[i] = instrumentalNode;
                    }
                } else {
                    // Fallback for Mono tracks (Phase inversion needs stereo)
                    statusMsg.innerText = "⚠️ Mono file detected. Phase inversion requires a stereo track.";
                    statusMsg.style.color = "#ef4444";
                    return;
                }

                // Convert AudioBuffer to playable WAV Blob
                const wavBlob = bufferToWav(outputBuffer);
                audioProcessed.src = URL.createObjectURL(wavBlob);

                statusMsg.style.display = 'none';
                playerPanel.style.display = 'flex';

            } catch (err) {
                console.error(err);
                statusMsg.innerText = "❌ Processing failed. Try another format.";
                statusMsg.style.color = "#ef4444";
            }
        });

        // Utility Function: AudioBuffer to standard WAV file format conversion
        function bufferToWav(buffer) {
            let numOfChan = buffer.numberOfChannels,
                length = buffer.length * numOfChan * 2 + 44,
                bufferArr = new ArrayBuffer(length),
                view = new DataView(bufferArr),
                channels = [], i, sample,
                offset = 0,
                pos = 0;

            function setUint16(data) { view.setUint16(pos, data, true); pos += 2; }
            function setUint32(data) { view.setUint32(pos, data, true); pos += 4; }

            setUint32(0x46464952); // "RIFF"
            setUint32(length - 8); // file length - 8
            setUint32(0x45564157); // "WAVE"
            setUint32(0x20746d66); // "fmt " chunk
            setUint32(16);         // chunk length
            setUint16(1);          // sample format (raw PCM)
            setUint16(numOfChan);
            setUint32(buffer.sampleRate);
            setUint32(buffer.sampleRate * 2 * numOfChan); // byte rate
            setUint16(numOfChan * 2);                     // block align
            setUint16(16);                                // bits per sample
            setUint32(0x61746164); // "data" chunk
            setUint32(length - pos - 4);

            for (i = 0; i < buffer.numberOfChannels; i++) channels.push(buffer.getChannelData(i));

            while (pos < length) {
                for (i = 0; i < numOfChan; i++) {
                    sample = Math.max(-1, Math.min(1, channels[i][offset]));
                    sample = (sample < 0 ? sample * 0x8000 : sample * 0x7FFF) | 0;
                    view.setInt16(pos, sample, true);
                    pos += 2;
                }
                offset++;
            }
            return new Blob([view], { type: 'audio/wav' });
        }
    </script>
</body>
</html>
